name: release-desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read version
        id: version
        shell: powershell
        run: |
          $version = (Get-Content -Path VERSION -Raw).Trim()
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Build desktop bundle
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_desktop_exe.ps1 -PythonExe python

      - name: Build installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_installer.ps1 -SkipDesktopBuild -PythonExe python

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            NeuroLab-Hub-Setup-v${{ steps.version.outputs.value }}.exe
            NeuroLab-Hub-v${{ steps.version.outputs.value }}.zip
            NeuroLab-Hub-Portable-v${{ steps.version.outputs.value }}.zip
